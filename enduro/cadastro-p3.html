<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/index.css">

        <!-- Compiled and minified CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0-beta/css/materialize.min.css">

        <!-- Materialize icons -->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        <title>Enduro - Coltec</title>
    </head>

    <body>
        
        <!-- Conteudo -->
		<div class="content">
        <div class="container">
        <div class="row">
        <div class="col s10 offset-s1 m6 offset-m3 l6 offset-l3 center-align">
        <div class="valign-wrapper">

            <!-- Card central -->
            <div class="card z-depth-6">
                <div class="card-content">

                <!-- Logo do coltec -->
                <spam id="logo-coltec" class="center-align"><img class="responsive-img" src="imgs/logo-coltec.png" height="30%" width="30%"></spam>

                <!-- Título -->
                <h3 class="center-align" id="title">Cadastro de equipes</h3>
                <fieldset class="col s4 offset-s4">
                    <legend id="progresso" class="center-align disabled-on-s"> Participantes </legend>
                </fieldset>

                <!-- Formulário -->
                <form action="">

                    <!-- Botão de add participantes -->
                    <div class="col s12"> <button class="btn green" onclick="addParticipantes()"> <i class="material-icons">add_circle</i> </button> </div>

                    <!-- Participantes -->
                    <div class="input-field col s12 input-wrapper"></div>


                    <!-- Botão de confirmação -->
                    <a href="cadastro-p3.html"  id="btn-prox" class="btn green center-align hoverable col s12 center-align"> Próximo </a>
                
                </form>
                    
                </div>
            </div>

        </div>
        </div>
        </div>
        </div>
        </div>

        <script src="js/add-participantes.js"></script>
         
    </body>
